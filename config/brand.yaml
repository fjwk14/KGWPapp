# =============================================================
# 株式会社ディバイド ブランドプロフィール
# -------------------------------------------------------------
# このファイルが AI コンテンツ生成・投稿計画のすべての土台です。
# ※ 現在は「インテリア・生活雑貨の BtoB 卸」と仮定した内容です。
#   実態と異なる場合はこのファイルだけ書き換えれば全体に反映されます。
# =============================================================

company:
  name: 株式会社ディバイド
  business: インテリア雑貨・生活雑貨・家具・テーブルウェアなどの卸売（BtoB）
  location: 兵庫県神戸市
  website: https://divide-floor.com/
  instagram_handle: ""   # 例: divide_official（@ は不要）

# 想定する読者（AI がトーンと内容を合わせます）
audience:
  - 小売店・セレクトショップのバイヤー
  - 店舗ディスプレイ・モデルルームの担当者
  - 住宅・インテリア関連の事業者
  - 暮らしの雑貨が好きな一般ユーザー

# 文体・トーンの指示
tone:
  style: 丁寧で親しみやすい敬体（です・ます調）
  personality: 押し売りせず、商品の使い方や暮らしのアイデアを提案する専門家
  emoji: 適度に使う（1投稿 3〜5 個まで）
  avoid:
    - 誇大な表現（「絶対」「日本一」「No.1」など根拠のない断定）
    - 他社への言及・比較
    - 過度な値引き訴求

# 投稿の柱（コンテンツピラー）: 週間プランはここからローテーション生成
pillars:
  - id: new-arrival
    name: 新商品・入荷情報
    description: 新しく入荷した商品を写真とともに紹介する
    format: image
  - id: styling
    name: ディスプレイ・コーディネート事例
    description: 店舗ディスプレイやテーブルコーディネートの実例・提案
    format: carousel
  - id: howto
    name: 商品活用アイデア（リール）
    description: 商品の使い方・組み合わせを短尺動画でテンポよく見せる
    format: reel
  - id: behind
    name: 会社の日常・スタッフ
    description: 倉庫やスタッフの様子など、会社の空気感を伝える
    format: image
  - id: info
    name: お知らせ・展示会情報
    description: 展示会出展・営業日・キャンペーンなどの告知
    format: image

# ハッシュタグ戦略
hashtags:
  # 毎回必ず付ける
  base:
    - ディバイド
    - インテリア雑貨
    - 生活雑貨
  # 投稿内容に応じて AI がここから選ぶ（+ 投稿固有のタグを生成）
  pool:
    - 雑貨卸
    - 雑貨屋さん
    - テーブルウェア
    - 店舗ディスプレイ
    - 暮らしを楽しむ
    - インテリアコーディネート
    - 神戸
    - セレクトショップ
    - 展示会
  # 上限（Instagram の仕様上限は 30）
  max_count: 15

# キャプション末尾に入れる定型文（CTA）
cta: |
  商品のお問い合わせはプロフィールのリンクからどうぞ。

# コンプライアンス: 投稿前チェックで弾く NG ワード
ng_words:
  - 日本一
  - 業界No.1
  - 絶対
  - 完全無料
